<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Lost &amp; Found System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0f6d1e; --primary-l: #0f1c4c; --primary-d: #0D47A1;
      --success: #2E7D32; --danger: #C62828;
      --text: #1A1A2E; --muted: #607D8B; --border: #DEE2E6;
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family:'DM Sans',sans-serif;
      background: linear-gradient(135deg, #003b28 0%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 64px rgba(0,0,0,.30);
      animation: popIn .35s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes popIn {
      from { opacity:0; transform:scale(.92) translateY(20px); }
      to   { opacity:1; transform:scale(1)   translateY(0);    }
    }
    .banner {
      background: linear-gradient(135deg, #0f6d1e);
      padding: 36px 32px 28px;
      text-align: center;
    }
    .banner .ico { font-size: 48px; margin-bottom: 10px; }
    .banner h1 { color: white; font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .banner p  { color: #ade6ce; font-size: 13px; }
    .form-area { padding: 32px; }
    .tabs-auth { display:flex; gap:0; margin-bottom:24px; border-radius:8px; overflow:hidden; border:1px solid var(--border); }
    .tab-auth {
      flex:1; padding:9px; text-align:center;
      font-size:13px; font-weight:600; cursor:pointer;
      background:#F5F7FA; color:var(--muted);
      border:none; transition:background .15s, color .15s;
    }
    .tab-auth.active { background:var(--primary); color:white; }
    .pane { display:none; }
    .pane.active { display:block; }
    .form-group { margin-bottom:16px; }
    label { display:block; font-size:12px; font-weight:600; color:var(--muted); margin-bottom:5px; text-transform:uppercase; letter-spacing:.5px; }
    input, select {
      width:100%; padding:10px 13px;
      border:1.5px solid var(--border); border-radius:8px;
      font-family:inherit; font-size:14px; color:var(--text);
      background:white; outline:none; transition:border-color .15s, box-shadow .15s;
    }
    input:focus, select:focus {
      border-color:var(--primary);
      box-shadow:0 0 0 3px rgba(21,101,192,.12);
    }
    .btn {
      width:100%; padding:11px; border-radius:8px; border:none;
      font-family:inherit; font-size:14px; font-weight:700;
      cursor:pointer; transition:background .15s, transform .1s;
      margin-top:4px;
    }
    .btn:active { transform:scale(.98); }
    .btn-primary { background:var(--primary); color:white; }
    .btn-primary:hover { background:var(--primary-l); }
    .alert {
      padding:10px 14px; border-radius:8px; font-size:13px;
      margin-bottom:16px; font-weight:500;
    }
    .alert-danger  { background:#FFEBEE; color:var(--danger);  border-left:4px solid var(--danger); }
    .alert-success { background:#E8F5E9; color:var(--success); border-left:4px solid var(--success); }
    .hint { text-align:center; margin-top:20px; font-size:12px; color:var(--muted); }
    .hint code { background:#F5F7FA; padding:2px 7px; border-radius:4px; font-family:monospace; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="banner">
    <img src="{{ url_for('static', filename='images/sjit2.png') }}" style="width: 100px; height: auto;" />
    <h1>Lost &amp; Found System</h1>
    <p>Saint Joseph Institute of Technology</p>
  </div>
  <div class="form-area">
    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in msgs %}
      <div class="alert alert-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <div class="tabs-auth">
      <button class="tab-auth active" data-pane="login-pane">Login</button>
      <button class="tab-auth"        data-pane="reg-pane">Register</button>
    </div>

    <!-- LOGIN -->
    <div class="pane active" id="login-pane">
      <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" placeholder="Enter username" required autocomplete="username"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="Enter password" required autocomplete="current-password"/>
        </div>
        <button type="submit" class="btn btn-primary">Login →</button>
      </form>
     
    </div>

    <!-- REGISTER -->
    <div class="pane" id="reg-pane">
      <form method="POST" action="{{ url_for('register') }}">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="full_name" placeholder="Your full name" required/>
        </div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" placeholder="Choose a username" required autocomplete="off"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="Choose a password" required autocomplete="new-password"/>
        </div>
        <button type="submit" class="btn btn-primary">Create Account →</button>
      </form>
    </div>
  </div>
</div>

<script>
  document.querySelectorAll('.tab-auth').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-auth').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(btn.dataset.pane).classList.add('active');
    });
  });
</script>
</body>
</html>
